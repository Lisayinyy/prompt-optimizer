<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auth Modal Preview — prompt.ai</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    background: oklch(93% 0.01 250);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 40px 16px;
  }

  /* 模拟侧边栏背景 */
  .sidebar-bg {
    width: 380px;
    height: 580px;
    background: oklch(99% 0.004 250);
    border-radius: 16px;
    box-shadow: 0 4px 24px oklch(0% 0 0 / 0.1);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* 背景遮罩 */
  .overlay {
    position: absolute;
    inset: 0;
    background: oklch(0% 0 0 / 0.45);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }

  /* Auth Sheet */
  .auth-sheet {
    width: 100%;
    background: oklch(99% 0.004 250);
    border-radius: 20px 20px 0 0;
    box-shadow: 0 -8px 40px oklch(0% 0 0 / 0.12), 0 -1px 0 oklch(85% 0.01 250);
    padding: 28px 24px 32px;
    position: relative;
  }

  .drag-bar {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 32px;
    height: 4px;
    border-radius: 2px;
    background: oklch(82% 0.01 250);
  }

  .close-btn {
    position: absolute;
    top: 14px;
    right: 16px;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: oklch(93% 0.008 250);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: oklch(50% 0.01 250);
  }

  /* Header */
  .brand-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    margin-top: 8px;
  }

  .brand-icon {
    width: 30px;
    height: 30px;
    border-radius: 9px;
    background: oklch(18% 0.01 250);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .brand-name {
    font-size: 12.5px;
    color: oklch(45% 0.01 250);
    font-weight: 500;
    letter-spacing: 0.01em;
  }

  .auth-title {
    font-size: 22px;
    font-weight: 700;
    color: oklch(15% 0.01 250);
    line-height: 1.2;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }

  .auth-subtitle {
    font-size: 13px;
    color: oklch(52% 0.01 250);
    margin-bottom: 20px;
  }

  /* Google Button */
  .google-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 11px 16px;
    border-radius: 12px;
    border: 1px solid oklch(88% 0.01 250);
    background: oklch(99% 0.004 250);
    font-size: 13.5px;
    font-weight: 500;
    color: oklch(18% 0.01 250);
    cursor: pointer;
    box-shadow: 0 1px 3px oklch(0% 0 0 / 0.06);
    transition: background 0.15s;
    margin-bottom: 16px;
  }

  .google-btn:hover { background: oklch(96% 0.008 250); }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: oklch(90% 0.008 250);
  }

  .divider-text {
    font-size: 11px;
    color: oklch(65% 0.01 250);
    letter-spacing: 0.04em;
  }

  /* Inputs */
  .input-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 12px;
  }

  .auth-input {
    width: 100%;
    padding: 11px 14px;
    border-radius: 10px;
    border: 1px solid oklch(88% 0.01 250);
    background: oklch(98% 0.005 250);
    font-size: 13.5px;
    color: oklch(15% 0.01 250);
    outline: none;
    font-family: inherit;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .auth-input::placeholder { color: oklch(72% 0.01 250); }
  .auth-input:focus {
    border-color: oklch(50% 0.02 250);
    box-shadow: 0 0 0 3px oklch(85% 0.02 250);
  }

  /* Primary Button */
  .primary-btn {
    width: 100%;
    padding: 12px 16px;
    border-radius: 12px;
    background: oklch(18% 0.01 250);
    color: white;
    font-size: 13.5px;
    font-weight: 600;
    letter-spacing: 0.01em;
    border: none;
    cursor: pointer;
    margin-bottom: 14px;
    transition: background 0.15s, transform 0.1s;
    font-family: inherit;
  }

  .primary-btn:hover { background: oklch(28% 0.01 250); }
  .primary-btn:active { transform: scale(0.98); }

  /* Switch mode */
  .switch-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-bottom: 10px;
  }

  .switch-text { font-size: 12.5px; color: oklch(55% 0.01 250); }
  .switch-link {
    font-size: 12.5px;
    font-weight: 600;
    color: oklch(35% 0.02 250);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    font-family: inherit;
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  /* Guest */
  .guest-btn {
    width: 100%;
    padding: 9px;
    background: transparent;
    border: none;
    font-size: 12px;
    color: oklch(62% 0.01 250);
    cursor: pointer;
    font-family: inherit;
    transition: color 0.15s;
  }
  .guest-btn:hover { color: oklch(30% 0.01 250); }

  /* Label */
  .preview-label {
    font-size: 12px;
    color: oklch(50% 0.01 250);
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<p class="preview-label">Auth Modal Preview — prompt.ai v6.7</p>

<div class="sidebar-bg">
  <!-- 模拟侧边栏内容（模糊背景） -->
  <div style="position:absolute;inset:0;padding:16px;opacity:0.3;">
    <div style="width:60%;height:12px;border-radius:6px;background:oklch(75% 0.01 250);margin-bottom:10px;"></div>
    <div style="width:40%;height:8px;border-radius:4px;background:oklch(82% 0.01 250);margin-bottom:24px;"></div>
    <div style="width:100%;height:80px;border-radius:12px;background:oklch(88% 0.01 250);margin-bottom:12px;"></div>
    <div style="width:100%;height:40px;border-radius:10px;background:oklch(90% 0.01 250);"></div>
  </div>

  <div class="overlay">
    <div class="auth-sheet">
      <div class="drag-bar"></div>

      <button class="close-btn">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
          <path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>

      <!-- Brand -->
      <div class="brand-row">
        <div class="brand-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3l1.9 5.8L20 9l-4.6 4.5 1.1 6.4L12 17l-4.5 2.9 1.1-6.4L4 9l6.1-.2z"/>
          </svg>
        </div>
        <span class="brand-name">prompt.ai</span>
      </div>

      <h2 class="auth-title">欢迎回来</h2>
      <p class="auth-subtitle">登录后查看你的提示词历史与洞察</p>

      <!-- Google -->
      <button class="google-btn">
        <svg width="17" height="17" viewBox="0 0 48 48">
          <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.6 32.8 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.5 6.5 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.9z"/>
          <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.5 19 12 24 12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.5 6.5 29.6 4 24 4 16.3 4 9.7 8.4 6.3 14.7z"/>
          <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.3 35.3 26.8 36 24 36c-5.3 0-9.7-3.2-11.4-7.8L6 33.5C9.3 39.7 16.1 44 24 44z"/>
          <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.3 5.6l6.2 5.2C41.3 35.1 44 30 44 24c0-1.3-.1-2.6-.4-3.9z"/>
        </svg>
        用 Google 账号继续
      </button>

      <!-- Divider -->
      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">或用邮箱</span>
        <div class="divider-line"></div>
      </div>

      <!-- Inputs -->
      <div class="input-group">
        <input class="auth-input" type="email" placeholder="邮箱地址" />
        <input class="auth-input" type="password" placeholder="密码（至少 6 位）" />
      </div>

      <!-- Primary CTA -->
      <button class="primary-btn">登录</button>

      <!-- Switch -->
      <div class="switch-row">
        <span class="switch-text">还没有账号？</span>
        <button class="switch-link">注册</button>
      </div>

      <!-- Guest -->
      <button class="guest-btn">以游客身份继续，暂不登录 →</button>
    </div>
  </div>
</div>

</body>
</html>
